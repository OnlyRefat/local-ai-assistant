server:
  port: 8089
debug: true
logging:
  file:
    name: logs/app.log
spring:
  application:
    name: rag
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma2:2b
      embedding:
        model: nomic-embed-text
      init:
        pull-model-strategy: when_missing
        timeout: 5m
    vectorstore:
      pgvector:
        dimensions: 768
        initialize-schema: true
        url: jdbc:postgresql://localhost:5432/vectordb
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}