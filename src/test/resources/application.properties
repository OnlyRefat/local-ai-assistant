# Disable DataSource auto-configuration for tests
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration

# Disable Docker Compose (won't try to start containers during tests)
spring.docker.compose.enabled=false

# Dummy datasource to satisfy any remaining checks
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver

# Disable Ollama connection
spring.ai.ollama.base-url=http://localhost:11434

# Disable vector store init
spring.ai.vectorstore.pgvector.initialize-schema=false